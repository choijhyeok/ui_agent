services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-local_figma}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-local_figma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_PORT: 8123
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/local_figma}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
    ports:
      - "${AGENT_HOST_PORT:-8123}:8123"
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8123/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  runtime:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    restart: unless-stopped
    environment:
      RUNTIME_PORT: 3001
      RUNTIME_PUBLIC_URL: ${RUNTIME_PUBLIC_URL:-http://localhost:${RUNTIME_HOST_PORT:-3001}}
    ports:
      - "${RUNTIME_HOST_PORT:-3001}:3001"
    volumes:
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      WEB_PORT: 3000
      AGENT_URL: ${AGENT_PUBLIC_URL:-http://localhost:${AGENT_HOST_PORT:-8123}}
      AGENT_SERVER_URL: http://agent:8123
      RUNTIME_URL: ${RUNTIME_PUBLIC_URL:-http://localhost:${RUNTIME_HOST_PORT:-3001}}
      RUNTIME_SERVER_URL: http://runtime:3001
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      agent:
        condition: service_healthy
      runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
